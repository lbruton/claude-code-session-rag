# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for SessionFlow.
# Based on Devops/.coderabbit.base.yaml; SessionFlow uses `main` as the
# default branch (no `dev`), and is Python-only — TS/TSX/SQL/Dockerfile
# path_instructions from the base are omitted.
#
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "en-US"
early_access: true

tone_instructions: >-
  Be direct and concise. Lead with the issue, not preamble.
  Use code examples when suggesting alternatives.
  Skip praise for obvious things — only call out genuinely good patterns.

reviews:
  profile: "chill"

  # PR summary features
  high_level_summary: true
  review_status: true
  poem: true
  collapse_walkthrough: false

  # Workflow
  request_changes_workflow: false
  abort_on_close: true

  # Auto-review settings
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    base_branches:
      - "main"

  # Global path filters — exclude noise
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.claude/**"
    - "!**/.gemini/**"
    - "!**/.agents/**"
    - "!**/.spec-workflow/**"
    - "!**/.specflow/**"
    - "!**/.codacy/**"
    - "!**/.github/**"
    - "!**/vendor/**"
    - "!**/venv/**"
    - "!**/__pycache__/**"
    - "!**/deprecated/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/screenshots/**"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.svg"

  # Path-specific review instructions
  path_instructions:
    - path: "**/*.py"
      instructions: |
        - Check for proper exception handling (no bare except).
        - Verify type hints on public function signatures.
        - Flag missing docstrings on public modules, classes, functions, and methods per the steering Documentation Standards (private symbols with a leading underscore are exempt unless the name is unclear).
        - Flag MLX / Metal calls that may cross thread boundaries (see CLAUDE.md MLX gotcha).
    - path: "tests/**"
      instructions: |
        - Verify meaningful assertions (not just "it runs without error").
        - Check for proper cleanup/teardown.

  # Finishing touches
  finishing_touches:
    docstrings:
      enabled: false

  # Static analysis tools
  tools:
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    opengrep:
      enabled: true

# Knowledge base — learn from feedback over time
knowledge_base:
  learnings:
    scope: auto

# Chat — allow @coderabbitai interactions in PR comments
chat:
  auto_reply: true
